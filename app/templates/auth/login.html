{% extends "base.html" %}

{% block title %}會員登入 - EventHub{% endblock %}

{% block content %}
<div class="auth-container">
    <h2 style="text-align: center; margin-bottom: 2rem;">會員登入</h2>
    <form method="POST" action="{{ url_for('auth.login') }}">
        <div class="form-group">
            <label for="username" class="form-label">帳號</label>
            <input type="text" id="username" name="username" class="form-control" required placeholder="請輸入帳號">
        </div>
        <div class="form-group">
            <label for="password" class="form-label">密碼</label>
            <input type="password" id="password" name="password" class="form-control" required placeholder="請輸入密碼">
        </div>
        <button type="submit" class="btn btn-primary" style="width: 100%; margin-top: 1rem;">登入</button>
    </form>
    <p style="text-align: center; margin-top: 1.5rem; color: var(--text-muted);">
        還沒有帳號嗎？ <a href="{{ url_for('auth.register') }}" style="color: var(--primary-color); text-decoration: none; font-weight: 600;">立即註冊</a>
    </p>
</div>
{% endblock %}
