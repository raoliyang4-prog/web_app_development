{% extends "base.html" %}

{% block title %}會員註冊 - EventHub{% endblock %}

{% block content %}
<div class="auth-container">
    <h2 style="text-align: center; margin-bottom: 2rem;">免費註冊</h2>
    <form method="POST" action="{{ url_for('auth.register') }}">
        <div class="form-group">
            <label for="username" class="form-label">帳號</label>
            <input type="text" id="username" name="username" class="form-control" required placeholder="設定你的使用者名稱">
        </div>
        <div class="form-group">
            <label for="email" class="form-label">電子信箱</label>
            <input type="email" id="email" name="email" class="form-control" required placeholder="例如：user@example.com">
        </div>
        <div class="form-group">
            <label for="password" class="form-label">密碼</label>
            <input type="password" id="password" name="password" class="form-control" required placeholder="至少 6 個字元">
        </div>
        <button type="submit" class="btn btn-primary" style="width: 100%; margin-top: 1rem;">註冊帳號</button>
    </form>
    <p style="text-align: center; margin-top: 1.5rem; color: var(--text-muted);">
        已經有帳號了嗎？ <a href="{{ url_for('auth.login') }}" style="color: var(--primary-color); text-decoration: none; font-weight: 600;">立即登入</a>
    </p>
</div>
{% endblock %}
