{% extends "base.html" %}

{% block title %}
{% if action == 'create' %}新增活動{% else %}編輯活動{% endif %} - EventHub
{% endblock %}

{% block content %}
<div class="page-header">
    <a href="{% if action == 'update' %}{{ url_for('event.detail', id=event.id) }}{% else %}{{ url_for('event.index') }}{% endif %}" class="btn btn-secondary">← 返回</a>
</div>

<div class="form-container" style="max-width: 600px;">
    <h2 style="margin-bottom: 2rem;">{% if action == 'create' %}新增活動{% else %}編輯活動{% endif %}</h2>
    
    <form method="POST" action="{% if action == 'create' %}{{ url_for('event.create_event') }}{% else %}{{ url_for('event.update_event', id=event.id) }}{% endif %}">
        
        <div class="form-group">
            <label for="title" class="form-label">活動標題 <span style="color: red;">*</span></label>
            <input type="text" id="title" name="title" class="form-control" required 
                   value="{{ event.title if event else '' }}" placeholder="請輸入活動名稱">
        </div>
        
        <div class="form-group">
            <label for="description" class="form-label">活動描述</label>
            <textarea id="description" name="description" class="form-control" placeholder="請詳細描述活動內容與注意事項">{{ event.description if event else '' }}</textarea>
        </div>
        
        <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 1.5rem;">
            <div class="form-group">
                <label for="start_time" class="form-label">開始時間 <span style="color: red;">*</span></label>
                <!-- 注意：在真實專案中可使用 type="datetime-local" -->
                <input type="text" id="start_time" name="start_time" class="form-control" required 
                       value="{{ event.start_time if event else '' }}" placeholder="例如: 2026-05-01 09:00">
            </div>
            
            <div class="form-group">
                <label for="end_time" class="form-label">結束時間 <span style="color: red;">*</span></label>
                <input type="text" id="end_time" name="end_time" class="form-control" required 
                       value="{{ event.end_time if event else '' }}" placeholder="例如: 2026-05-01 12:00">
            </div>
        </div>
        
        <div class="form-group">
            <label for="max_capacity" class="form-label">人數上限 <span style="color: red;">*</span></label>
            <input type="number" id="max_capacity" name="max_capacity" class="form-control" required min="1" 
                   value="{{ event.max_capacity if event else '' }}" placeholder="請輸入正整數">
        </div>
        
        <div style="display: flex; justify-content: flex-end; margin-top: 2rem;">
            <button type="submit" class="btn btn-primary">{% if action == 'create' %}建立活動{% else %}儲存變更{% endif %}</button>
        </div>
    </form>
</div>
{% endblock %}
